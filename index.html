<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Básico -->
    <title>Usta Gallery | Universidad Santo Tomás</title>
    <meta name="description" content="Explora, gestiona y visualiza obras de arte en Usta Gallery. Plataforma digital moderna para el grupo de arte de la Universidad Santo Tomás, Tunja." />
    <meta name="keywords" content="galería de arte, arte digital, Universidad Santo Tomás, Tunja, exposición de arte, obras artísticas" />
    <meta name="author" content="Universidad Santo Tomás - Grupo de Arte" />
    
    <!-- Open Graph (Redes Sociales) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Usta Gallery - Galería de Arte" />
    <meta property="og:description" content="Plataforma digital interactiva para explorar y gestionar obras de arte del grupo de arte de la Universidad Santo Tomás." />
    <meta property="og:url" content="/public/img-og.png" />
    <meta property="og:image" content="/public/img-og.png" />
    <meta property="og:site_name" content="Usta Gallery" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Usta Gallery - Galería de Arte" />
    <meta name="twitter:description" content="Descubre la galería de arte de la Universidad Santo Tomás en línea." />
    <meta name="twitter:image" content="/public/img-og.png" />
    
    <!-- Canonical URL -->
    <meta name="canonical" href="" />
    
    <!-- Robots y Indexación -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Spanish" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/public/logo.png" />
    <link rel="apple-touch-icon" href="/public/apple-touch-icon.png" />
    
    <!-- Preconnect para optimización -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

</html>
